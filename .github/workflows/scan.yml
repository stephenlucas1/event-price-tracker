name: Price Scan

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes (public repo = unlimited minutes)
  workflow_dispatch:

concurrency:
  group: cv-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan
        env:
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:      ${{ secrets.SUPABASE_KEY }}
          VAPID_PUBLIC_KEY:  ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_CLAIM_EMAIL: ${{ secrets.VAPID_CLAIM_EMAIL }}
          # Secret, not var: public Actions logs would show a var's value,
          # and the city list narrows down who runs this.
          CV_CITIES:     ${{ secrets.CV_CITIES }}
          CV_MAX_EVENTS: ${{ vars.CV_MAX_EVENTS }}
          CV_DROP_PCT:   ${{ vars.CV_DROP_PCT }}
        run: python cv_scanner.py
